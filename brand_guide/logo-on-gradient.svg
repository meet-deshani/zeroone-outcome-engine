  <circle cx="62" cy="88" r="10" fill="rgba(25,25,36,0.15)"/>
  <circle cx="88" cy="88" r="10" fill="#191924"/>
  
  <!-- Wordmark -->
  <text x="120" y="58" font-family="'Space Mono', 'Courier New', monospace" font-weight="700" font-size="18" letter-spacing="2" fill="#191924">ZEROONE</text>
